<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IGG Personality Analyzer</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">

<!-- PAGE 1 -->
<div class="card" id="page-1">

<h1>IGG Personality Analyzer</h1>

<input type="text" id="name" placeholder="Enter your name"/>

<select id="personality">
  <option value="">Select Type</option>
  <option>Overthinker</option>
  <option>Overthinker Pro Max</option>
</select>

<textarea id="strengths" placeholder="Enter strengths"></textarea>

<!-- NEW WEAKNESS RADIO -->
<div class="form-group">
  <label>Select your weakness 😏</label>

  <div class="radio-group">
    <label><input type="radio" name="weakness" value="Falls for mask girl 😷"> Fall for mask girl</label>
    <label><input type="radio" name="weakness" value="Falls for cute voice girl 🎙️"> Cute voice girl</label>
    <label><input type="radio" name="weakness" value="Falls for senior girl 🎓"> Senior girl</label>
    <label><input type="radio" name="weakness" value="Afraid to approach 😶"> Afraid to approach</label>
  </div>
</div>

<button onclick="startAnalysis()">Analyze</button>

</div>

<!-- PAGE 2 -->
<div class="card hidden" id="page-2">

<h2 id="result-name"></h2>
<p id="result-personality"></p>

<h3>Strengths</h3>
<ul id="strengths-list"></ul>

<h3>Weakness</h3>
<ul id="weakness-list"></ul>

<button onclick="showReport()">Generate Report</button>

</div>

<!-- PAGE 3 -->
<div class="card hidden" id="page-3">

<img src="april-fool.png" style="width:120px">

<h2>This report confirms you are officially fooled 😄</h2>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
